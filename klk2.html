<title>Validación</title>

<style>

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;

}

/* Barra superior verde */
.topbar{
    background:#8BC34A;
    padding:25px 20px;
    font-style:italic;

    letter-spacing:2px;
    color:#1b5e20;

.linea{

}

/* Tabla estilo bloques */
.tabla{
    margin-top:40px;
    width:100%;
    border-collapse:collapse;
}

.tabla tr{
    border-bottom:1px solid #ddd;
}

.label{
    width:40%;
    background:#e0e0e0;
    padding:25px 20px;
    font-size:28px;
}

.value{
    background:#f5f5f5;
    padding:25px 20px;
    font-size:28px;
    color:#666;
}

/* Pie gris grande */
.footer{
    margin-top:40px;
    background:#d6d6d6;
    padding:35px 25px;
    font-size:36px;
    color:#444;
}
</style>
</head>
